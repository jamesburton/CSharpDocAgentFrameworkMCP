name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build TypeScript sidecar
        working-directory: src/ts-symbol-extractor
        run: |
          npm ci
          npm run build

      - name: Restore
        run: dotnet restore src/DocAgentFramework.sln

      - name: Build
        run: dotnet build src/DocAgentFramework.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/DocAgentFramework.sln -c Release --no-build --verbosity normal

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/DocAgent.McpServer/DocAgent.McpServer.csproj
          -c Release
          --no-build
          -p:PackageVersion=${{ steps.version.outputs.VERSION }}
          -o ./nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./nupkg/*.nupkg
